<svg width="1280" height="384" viewBox="0 0 1280 384" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="LocalHost Pages — every AI tool's HTML output, aggregated at one local URL">
  <!-- backdrop -->
  <rect width="1280" height="384" fill="#1a1822"/>

  <!-- top spectrum rule: the 32-colour pastel palette, a brutalist accent strip -->
  <g>
    <rect x="0"    y="0" width="142.3" height="6" fill="#a8c8a3"/>
    <rect x="142.3" y="0" width="142.3" height="6" fill="#c8a3c4"/>
    <rect x="284.6" y="0" width="142.3" height="6" fill="#d6a3a3"/>
    <rect x="426.9" y="0" width="142.3" height="6" fill="#a3b8d6"/>
    <rect x="569.2" y="0" width="142.3" height="6" fill="#c4b8a3"/>
    <rect x="711.5" y="0" width="142.3" height="6" fill="#a3c4c4"/>
    <rect x="853.8" y="0" width="142.3" height="6" fill="#d6c4a3"/>
    <rect x="996.1" y="0" width="142.3" height="6" fill="#b8a3d6"/>
    <rect x="1138.4" y="0" width="141.6" height="6" fill="#bdd0b8"/>
  </g>

  <!-- ===== left: wordmark + address + tagline ===== -->

  <!-- address bar pill -->
  <g>
    <rect x="64" y="74" width="248" height="34" rx="6" fill="#221f2c" stroke="#2e2a38"/>
    <circle cx="86" cy="91" r="5" fill="#a8c8a3"/>
    <text x="102" y="96" font-size="15" font-weight="500" fill="#9b948a">http://localhost/</text>
  </g>

  <!-- wordmark -->
  <text x="62" y="212" font-size="76" font-weight="700" letter-spacing="-2">
    <tspan fill="#ede7dc">LocalHost</tspan><tspan fill="#d6c4a3"> Pages</tspan>
  </text>

  <!-- tagline -->
  <text x="64" y="262" font-size="21" font-weight="500" fill="#9b948a">Every AI tool's HTML output, aggregated at one local URL.</text>

  <!-- feature chips -->
  <g font-size="13" font-weight="500" fill="#ede7dc">
    <g>
      <rect x="64" y="296" width="124" height="30" rx="6" fill="none" stroke="#2e2a38"/>
      <text x="80" y="315" fill="#a8c8a3">●</text>
      <text x="98" y="316">live-reload</text>
    </g>
    <g>
      <rect x="200" y="296" width="104" height="30" rx="6" fill="none" stroke="#2e2a38"/>
      <text x="216" y="315" fill="#c8a3c4">●</text>
      <text x="234" y="316">preview</text>
    </g>
    <g>
      <rect x="316" y="296" width="150" height="30" rx="6" fill="none" stroke="#2e2a38"/>
      <text x="332" y="315" fill="#a3b8d6">●</text>
      <text x="350" y="316">drop-in symlink</text>
    </g>
    <g>
      <rect x="478" y="296" width="122" height="30" rx="6" fill="none" stroke="#2e2a38"/>
      <text x="494" y="315" fill="#d6a3a3">●</text>
      <text x="512" y="316">zero config</text>
    </g>
  </g>

  <!-- ===== right: a grid of registered-app cards ===== -->
  <g>
    <!-- card template repeated; left accent stripe, icon dot, title + meta lines -->

    <!-- c1 sage + new -->
    <g>
      <rect x="900" y="70" width="150" height="86" rx="8" fill="#221f2c" stroke="#2e2a38"/>
      <rect x="900" y="70" width="4" height="86" fill="#a8c8a3"/>
      <circle cx="927" cy="98" r="9" fill="#a8c8a3" fill-opacity="0.22"/><circle cx="927" cy="98" r="4" fill="#a8c8a3"/>
      <rect x="916" y="118" width="84" height="7" rx="3.5" fill="#ede7dc" fill-opacity="0.82"/>
      <rect x="916" y="134" width="54" height="6" rx="3" fill="#9b948a" fill-opacity="0.6"/>
      <circle cx="1034" cy="86" r="4" fill="#a8c8a3"/>
    </g>

    <!-- c2 mauve -->
    <g>
      <rect x="1066" y="70" width="150" height="86" rx="8" fill="#221f2c" stroke="#2e2a38"/>
      <rect x="1066" y="70" width="4" height="86" fill="#c8a3c4"/>
      <circle cx="1093" cy="98" r="9" fill="#c8a3c4" fill-opacity="0.22"/><circle cx="1093" cy="98" r="4" fill="#c8a3c4"/>
      <rect x="1082" y="118" width="72" height="7" rx="3.5" fill="#ede7dc" fill-opacity="0.82"/>
      <rect x="1082" y="134" width="60" height="6" rx="3" fill="#9b948a" fill-opacity="0.6"/>
    </g>

    <!-- c3 powder -->
    <g>
      <rect x="900" y="172" width="150" height="86" rx="8" fill="#221f2c" stroke="#2e2a38"/>
      <rect x="900" y="172" width="4" height="86" fill="#a3b8d6"/>
      <circle cx="927" cy="200" r="9" fill="#a3b8d6" fill-opacity="0.22"/><circle cx="927" cy="200" r="4" fill="#a3b8d6"/>
      <rect x="916" y="220" width="64" height="7" rx="3.5" fill="#ede7dc" fill-opacity="0.82"/>
      <rect x="916" y="236" width="48" height="6" rx="3" fill="#9b948a" fill-opacity="0.6"/>
    </g>

    <!-- c4 peach + new -->
    <g>
      <rect x="1066" y="172" width="150" height="86" rx="8" fill="#221f2c" stroke="#2e2a38"/>
      <rect x="1066" y="172" width="4" height="86" fill="#d6c4a3"/>
      <circle cx="1093" cy="200" r="9" fill="#d6c4a3" fill-opacity="0.22"/><circle cx="1093" cy="200" r="4" fill="#d6c4a3"/>
      <rect x="1082" y="220" width="80" height="7" rx="3.5" fill="#ede7dc" fill-opacity="0.82"/>
      <rect x="1082" y="236" width="52" height="6" rx="3" fill="#9b948a" fill-opacity="0.6"/>
      <circle cx="1200" cy="188" r="4" fill="#a8c8a3"/>
    </g>

    <!-- c5 mist -->
    <g>
      <rect x="900" y="274" width="150" height="86" rx="8" fill="#221f2c" stroke="#2e2a38"/>
      <rect x="900" y="274" width="4" height="86" fill="#a3c4c4"/>
      <circle cx="927" cy="302" r="9" fill="#a3c4c4" fill-opacity="0.22"/><circle cx="927" cy="302" r="4" fill="#a3c4c4"/>
      <rect x="916" y="322" width="76" height="7" rx="3.5" fill="#ede7dc" fill-opacity="0.82"/>
      <rect x="916" y="338" width="44" height="6" rx="3" fill="#9b948a" fill-opacity="0.6"/>
    </g>

    <!-- c6 lavender -->
    <g>
      <rect x="1066" y="274" width="150" height="86" rx="8" fill="#221f2c" stroke="#2e2a38"/>
      <rect x="1066" y="274" width="4" height="86" fill="#b8a3d6"/>
      <circle cx="1093" cy="302" r="9" fill="#b8a3d6" fill-opacity="0.22"/><circle cx="1093" cy="302" r="4" fill="#b8a3d6"/>
      <rect x="1082" y="322" width="68" height="7" rx="3.5" fill="#ede7dc" fill-opacity="0.82"/>
      <rect x="1082" y="338" width="58" height="6" rx="3" fill="#9b948a" fill-opacity="0.6"/>
    </g>
  </g>
</svg>
